<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-list</title>
<link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="todo-box">
        <h1>
            TO-DO List

        </div>
        <div class="list-container">
            <ul id="todo-list">
                
             </ul>
        </div>
    </div>
 <script src="index.js"></script>   
</body>
</html>
